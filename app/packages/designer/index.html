<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Blueprint - Codebase Map Explorer</title>
    <meta
      name="description"
      content="Blueprint maps your codebase as an interactive C4-style diagram — explore systems, containers, and components, and keep architecture docs in sync with YAML."
    />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mzworthington.github.io/blueprint/" />
    <meta property="og:title" content="Blueprint - Codebase Map Explorer" />
    <meta property="og:description" content="Blueprint maps your codebase as an interactive C4-style diagram — explore systems, containers, and components, and keep architecture docs in sync with YAML." />
    <meta property="og:image" content="https://mzworthington.github.io/blueprint/assets/logo.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://mzworthington.github.io/blueprint/" />
    <meta name="twitter:title" content="Blueprint - Codebase Map Explorer" />
    <meta name="twitter:description" content="Blueprint maps your codebase as an interactive C4-style diagram — explore systems, containers, and components, and keep architecture docs in sync with YAML." />
    <meta name="twitter:image" content="https://mzworthington.github.io/blueprint/assets/logo.png" />
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

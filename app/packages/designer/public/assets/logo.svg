    <g stroke="#4ce2f5" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
      <path d="M 185,185 L 230,158" />
      <path d="M 270,155 L 320,180" />
      <path d="M 340,210 L 333,280" />
      <path d="M 310,318 L 270,342" />

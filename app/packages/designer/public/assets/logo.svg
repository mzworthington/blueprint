             fill="none" stroke="#4ce2f5" stroke-width="3" stroke-linejoin="round" opacity="0.9" />

    <g stroke="#4ce2f5" stroke-width="1.5" opacity="0.65">
      <line x1="250" y1="70" x2="250" y2="115" />
      <line x1="406" y1="160" x2="367" y2="182.5" />
      <line x1="406" y1="340" x2="367" y2="317.5" />
      <line x1="250" y1="430" x2="250" y2="385" />
      <line x1="94" y1="340" x2="133" y2="317.5" />
      <line x1="94" y1="160" x2="133" y2="182.5" />
      
      <line x1="250" y1="115" x2="367" y2="317.5" />
      <line x1="250" y1="115" x2="133" y2="317.5" />
      <line x1="250" y1="385" x2="367" y2="182.5" />
      <line x1="250" y1="385" x2="133" y2="182.5" />
      <line x1="133" y1="317.5" x2="367" y2="317.5" />
      <line x1="133" y1="182.5" x2="367" y2="182.5" />
    </g>

    <polygon points="250,215 280,232.5 280,267.5 250,285 220,267.5 220,232.5" 
             fill="none" stroke="#4ce2f5" stroke-width="3" stroke-linejoin="round" />

    <g stroke="#4ce2f5" stroke-width="2.5" marker-end="url(#arrow)">
      <line x1="250" y1="215" x2="250" y2="165" />
      <line x1="280" y1="232.5" x2="323" y2="207.5" />
      <line x1="280" y1="267.5" x2="323" y2="292.5" />
      <line x1="250" y1="285" x2="250" y2="335" />
      <line x1="220" y1="267.5" x2="177" y2="292.5" />
      <line x1="220" y1="232.5" x2="177" y2="207.5" />
    </g>

    <circle cx="250" cy="150" r="12" fill="#4ce2f5" />
    <circle cx="250" cy="350" r="12" fill="#4ce2f5" />
    <circle cx="160" cy="250" r="12" fill="#4ce2f5" />
    <circle cx="340" cy="190" r="12" fill="#4ce2f5" />

    <polygon points="170,170 183,177.5 183,192.5 170,200 157,192.5 157,177.5" 

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur1"/>
      <feGaussianBlur stdDeviation="4" result="coloredBlur2"/>
      <feMerge>
        <feMergeNode in="coloredBlur1" />
        <feMergeNode in="coloredBlur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#4ce2f5" />
    </marker>
  </defs>

  <g filter="url(#neon-glow)">
    
    <polygon points="250,70 406,160 406,340 250,430 94,340 94,160" 
             fill="none" stroke="#4ce2f5" stroke-width="4.5" stroke-linejoin="round" />


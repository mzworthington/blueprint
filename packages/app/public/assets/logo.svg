<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 40 40 M 0 40 L 40 40" fill="none" stroke="#0f1e3c" stroke-width="1" />
      <path d="M 8 0 L 8 40 M 16 0 L 16 40 M 24 0 L 24 40 M 32 0 L 32 40 M 0 8 L 40 8 M 0 16 L 40 16 M 0 24 L 40 24 M 0 32 L 40 32" fill="none" stroke="#081329" stroke-width="0.5" />
    </pattern>

    <!-- Neon Cyan Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Accent Glow Filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Marker definition for arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#00f0ff" />
    </marker>
  </defs>

  <style>
    .bg { fill: #040914; }
    .grid-lines { fill: url(#gridPattern); }
    .blueprint-circle { stroke: #122854; stroke-width: 1.5; fill: none; opacity: 0.7; }
    .axis-line { stroke: #163065; stroke-width: 1; stroke-dasharray: 8 4; opacity: 0.6; }
    .measurement { stroke: #1c3d7e; stroke-width: 0.8; opacity: 0.4; }
    
    /* Schematic Styles */
    .node-box { fill: #061125; stroke: #00f0ff; stroke-width: 3; filter: url(#neonGlow); }
    .node-db { fill: #061125; stroke: #00f0ff; stroke-width: 3; filter: url(#neonGlow); }
    .node-gate { fill: #061125; stroke: #00f0ff; stroke-width: 3; filter: url(#neonGlow); }
    .wire { stroke: #00f0ff; stroke-width: 2.5; fill: none; filter: url(#softGlow); }
    .wire-dim { stroke: #00d8ff; stroke-width: 1.5; fill: none; opacity: 0.5; }
    
    /* Text styling */
    .text-title {
      font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, sans-serif;
      font-weight: 800;
      fill: #ffffff;
      font-size: 80px;
      letter-spacing: -1.5px;
    }
    
    /* Animation effects */
    @keyframes pulse {
      0% { opacity: 0.8; filter: drop-shadow(0 0 2px rgba(0, 240, 255, 0.4)); }
      50% { opacity: 1; filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.9)); }
      100% { opacity: 0.8; filter: drop-shadow(0 0 2px rgba(0, 240, 255, 0.4)); }
    }
    
    .animated-glow {
      animation: pulse 4s infinite ease-in-out;
    }
  </style>

  <!-- Background base -->
  <rect width="800" height="800" class="bg" />
  <rect width="800" height="800" class="grid-lines" />

  <!-- Drafting Blueprint Markings -->
  <g class="animated-glow">
    <!-- Circular boundary of schematic -->
    <circle cx="400" cy="360" r="210" class="blueprint-circle" />
    <circle cx="400" cy="360" r="213" class="blueprint-circle" stroke-dasharray="2 6" />
    <circle cx="400" cy="360" r="230" class="blueprint-circle" stroke-dasharray="100 20" opacity="0.3" />
    <circle cx="400" cy="360" r="235" class="blueprint-circle" stroke-dasharray="5 5" opacity="0.3" />
    
    <!-- Coordinate ticks -->
    <path d="M 400 110 L 400 130 M 400 590 L 400 610 M 150 360 L 170 360 M 630 360 L 650 360" class="measurement" />
    <path d="M 400 80 L 400 640 M 120 360 L 680 360" class="axis-line" />
    
    <!-- Schematic corner markers -->
    <path d="M 80 120 L 120 120 M 80 120 L 80 160 M 720 120 L 680 120 M 720 120 L 720 160 M 80 600 L 120 600 M 80 600 L 80 560 M 720 600 L 680 600 M 720 600 L 720 560" stroke="#122854" stroke-width="1.5" fill="none" />
  </g>

  <!-- Wires & Interconnections -->
  <g>
    <!-- Wire paths matching flowchart -->
    <!-- Top node to Top-Left -->
    <path d="M 400 230 L 320 230 L 320 290" class="wire" marker-end="url(#arrow)" />
    
    <!-- Top-Left to Center-Left -->
    <path d="M 320 340 L 320 380 L 265 380 L 265 405" class="wire" marker-end="url(#arrow)" />
    
    <!-- Center-Left to Bottom-Left -->
    <path d="M 265 455 L 265 520 L 290 520" class="wire" marker-end="url(#arrow)" />
    
    <!-- Bottom-Left to Center-Middle -->
    <path d="M 340 520 L 350 520 L 350 490 L 375 490" class="wire" marker-end="url(#arrow)" />
    
    <!-- Center-Middle to Top Node (UP) -->
    <path d="M 400 405 L 400 260" class="wire" marker-end="url(#arrow)" />
    
    <!-- Top Node to Top-Right DB -->
    <path d="M 400 205 L 485 205 L 485 285" class="wire" marker-end="url(#arrow)" />
    
    <!-- Center-Middle to OR gate input -->
    <path d="M 425 435 L 450 435" class="wire" marker-end="url(#arrow)" />
    
    <!-- NOR Gate to OR Gate Input -->
    <path d="M 485 530 L 485 450" class="wire" marker-end="url(#arrow)" />
    
    <!-- Bottom-Center to NOR gate -->
    <path d="M 400 580 L 400 550 L 455 550" class="wire" marker-end="url(#arrow)" />
    
    <!-- Center-Middle to Bottom-Center -->
    <path d="M 400 465 L 400 550" class="wire" marker-end="url(#arrow)" />
    
    <!-- OR gate to Right-Center Component -->
    <path d="M 505 435 L 535 435" class="wire" marker-end="url(#arrow)" />
    
    <!-- Right-Center Component to Top-Right DB (UP) -->
    <path d="M 560 410 L 560 320 L 520 320" class="wire" marker-end="url(#arrow)" />
    
    <!-- Top-Right DB to Center-Middle -->
    <path d="M 470 320 L 435 320 L 435 420 L 420 420" class="wire" marker-end="url(#arrow)" />
    
    <!-- Bottom-Center to Bottom-Left DB -->
    <path d="M 375 580 L 320 580 L 320 560" class="wire" marker-end="url(#arrow)" />
    
    <!-- NOR gate to Bottom-Center component feedback -->
    <path d="M 490 565 L 490 595 L 430 595" class="wire" marker-end="url(#arrow)" />
  </g>

  <!-- Schematic Nodes (Layered on top of wires) -->
  <g class="animated-glow">
    <!-- Top Center Component Node -->
    <rect x="375" y="180" width="50" height="50" rx="3" class="node-box" />
    <path d="M 390 190 H 410 V 210 H 390 Z" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />

    <!-- Top Left Component Node -->
    <rect x="295" y="290" width="50" height="50" rx="3" class="node-box" />
    <circle cx="320" cy="315" r="10" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />

    <!-- Top Right Database (Cylinder) -->
    <g transform="translate(470, 280)">
      <!-- Cylinder top -->
      <ellipse cx="25" cy="10" rx="25" ry="8" class="node-db" />
      <!-- Cylinder body -->
      <path d="M 0 10 L 0 40 A 25 8 0 0 0 50 40 L 50 10 Z" class="node-db" />
      <!-- Interior cylinder lines -->
      <path d="M 0 20 A 25 8 0 0 0 50 20 M 0 30 A 25 8 0 0 0 50 30" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />
    </g>

    <!-- Center Left Component Node -->
    <rect x="240" y="405" width="50" height="50" rx="3" class="node-box" />
    <path d="M 250 430 H 280 M 265 415 V 445" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />

    <!-- Center Middle Component Node -->
    <rect x="375" y="405" width="50" height="50" rx="3" class="node-box" />
    <rect x="388" y="418" width="24" height="24" rx="2" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />

    <!-- OR Gate Node -->
    <g transform="translate(450, 415)">
      <!-- OR Gate Outline -->
      <path d="M 0 5 C 10 5, 12 15, 20 20 C 12 25, 10 35, 0 35 C 5 25, 5 15, 0 5 Z" class="node-gate" />
      <line x1="3" y1="20" x2="10" y2="20" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />
    </g>

    <!-- Center Right Far Component Node -->
    <rect x="535" y="405" width="50" height="50" rx="3" class="node-box" />
    <path d="M 545 415 L 575 445 M 575 415 L 545 445" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />

    <!-- Bottom Left Database (Cylinder) -->
    <g transform="translate(295, 500)">
      <ellipse cx="25" cy="10" rx="25" ry="8" class="node-db" />
      <path d="M 0 10 L 0 40 A 25 8 0 0 0 50 40 L 50 10 Z" class="node-db" />
      <path d="M 0 20 A 25 8 0 0 0 50 20 M 0 30 A 25 8 0 0 0 50 30" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />
    </g>

    <!-- Bottom Center Component Node -->
    <rect x="375" y="555" width="50" height="50" rx="3" class="node-box" />
    <circle cx="400" cy="580" r="10" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />
    <line x1="400" y1="570" x2="400" y2="590" stroke="#00f0ff" stroke-width="1.5" opacity="0.7" />

    <!-- NOR Gate Node -->
    <g transform="translate(455, 530)">
      <!-- NOR Gate Outline (OR + small invert circle) -->
      <path d="M 0 5 C 10 5, 12 15, 20 20 C 12 25, 10 35, 0 35 C 5 25, 5 15, 0 5 Z" class="node-gate" />
      <circle cx="23" cy="20" r="3" fill="#061125" stroke="#00f0ff" stroke-width="2" />
    </g>
  </g>

  <!-- Title Text -->
  <text x="400" y="725" text-anchor="middle" class="text-title">blueprint</text>
</svg>

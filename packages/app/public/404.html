<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Blueprint SPA Fallback</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      
      // If the app is hosted under a subdirectory (e.g. username.github.io/repo-name/),
      // set pathSegmentsToKeep to 1. If hosted on a custom domain, set it to 0.
      var pathSegmentsToKeep = 0; 
      
      var l = window.location;
      
      // Auto-detect subdirectory if hosted on github.io and no custom domain is used
      if (l.hostname.indexOf('github.io') !== -1 && l.pathname.split('/').length > 2) {
        pathSegmentsToKeep = 1;
      }

      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>

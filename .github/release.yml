changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - github-actions[bot]
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - feat
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "⚙️ Refactoring & Performance"
      labels:
        - refactor
        - perf
        - improvement
    - title: "🧰 Maintenance & Dependencies"
      labels:
        - chore
        - dependencies

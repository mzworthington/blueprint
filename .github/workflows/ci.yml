  check-ts-cli-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      should_release: ${{ steps.check_changes.outputs.should_release }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Check if TypeScript CLI or Proto files changed
        id: check_changes
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt || git show --name-only --pretty="" HEAD > changed_files.txt
          cat changed_files.txt
          
          if grep -qE '^(app/packages/cli/|core/proto/)' changed_files.txt; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build-ts-cli-binaries:
    needs: check-ts-cli-release
    if: needs.check-ts-cli-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Generate TypeScript protobufs
        run: pnpm --filter @blueprint/cli generate:proto
        working-directory: app

      - name: Compile TS CLI Binaries
        run: |
          mkdir -p dist/linux dist/macos-x64 dist/macos-arm64 dist/windows
          bun build app/packages/cli/src/blueprint.ts --compile --target=bun-linux-x64 --outfile=dist/linux/blueprint
          bun build app/packages/cli/src/blueprint.ts --compile --target=bun-darwin-x64 --outfile=dist/macos-x64/blueprint
          bun build app/packages/cli/src/blueprint.ts --compile --target=bun-darwin-arm64 --outfile=dist/macos-arm64/blueprint
          bun build app/packages/cli/src/blueprint.ts --compile --target=bun-windows-x64 --outfile=dist/windows/blueprint.exe

      - name: Package Archives
        run: |
          mkdir -p dist/archives
          tar -czf dist/archives/blueprint-linux-x64.tar.gz -C dist/linux blueprint
          tar -czf dist/archives/blueprint-macos-x64.tar.gz -C dist/macos-x64 blueprint
          tar -czf dist/archives/blueprint-macos-arm64.tar.gz -C dist/macos-arm64 blueprint
          zip -j dist/archives/blueprint-windows-x64.zip dist/windows/blueprint.exe

      - name: Upload TS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ts-cli-binaries
          path: dist/archives/

  publish-ts-release:
    needs: [check-ts-cli-release, build-ts-cli-binaries]
    if: needs.check-ts-cli-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download TS Artifacts
        uses: actions/download-artifact@v7
        with:
          name: ts-cli-binaries
          path: dist

      - name: Determine Next Version
        id: versioning
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --match "v*" --exclude "rust-v*" --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Latest tag found: $LATEST_TAG"
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_TAG="v$major.$minor.$NEW_PATCH"
          echo "Next release version: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.versioning.outputs.new_tag }}
          name: Release ${{ steps.versioning.outputs.new_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/blueprint-linux-x64.tar.gz
            dist/blueprint-macos-x64.tar.gz
            dist/blueprint-macos-arm64.tar.gz
            dist/blueprint-windows-x64.zip

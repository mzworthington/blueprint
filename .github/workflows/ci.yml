name: CI & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Code Formatting
        run: pnpm format:check

      - name: Check Linting Rules
        run: pnpm lint

      - name: Check Unused Code & Dependencies (Knip)
        run: pnpm knip --reporter github-actions

      - name: Run Test Suite with Coverage
        run: pnpm test:coverage

      - name: Report Vitest Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @blueprint/app exec playwright install --with-deps chromium

      - name: Run E2E Tests
        run: pnpm test:e2e

      - name: Upload Playwright Report & Screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            packages/app/playwright-report/
            docs/screenshots/
          retention-days: 30

      - name: Compile Production Build
        run: pnpm build

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: './packages/app/dist'

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release-cli:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Fetch all history for tags resolving & diffs

      - name: Check if CLI files changed
        id: check_changes
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt || git show --name-only --pretty="" HEAD > changed_files.txt
          cat changed_files.txt
          
          if grep -qE '^(packages/cli/src/analysis/|packages/cli/src/blueprint\.ts|packages/core/src/models/)' changed_files.txt; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        if: steps.check_changes.outputs.should_release == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        if: steps.check_changes.outputs.should_release == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        if: steps.check_changes.outputs.should_release == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        if: steps.check_changes.outputs.should_release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Determine Next Version
        id: versioning
        if: steps.check_changes.outputs.should_release == 'true'
        run: |
          git fetch --tags
          # Get latest tag, fallback to v0.1.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Latest tag found: $LATEST_TAG"
          
          # Remove 'v' prefix
          VERSION=${LATEST_TAG#v}
          
          # Parse major, minor, patch
          IFS='.' read -r major minor patch <<< "$VERSION"
          
          # Increment patch version
          NEW_PATCH=$((patch + 1))
          NEW_TAG="v$major.$minor.$NEW_PATCH"
          echo "Next release version: $NEW_TAG"
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Compile CLI Binaries (Cross-Platform)
        if: steps.check_changes.outputs.should_release == 'true'
        run: |
          mkdir -p dist/linux-x64 dist/macos-x64 dist/macos-arm64 dist/windows-x64
          
          echo "Compiling Linux (x64)..."
          bun build ./packages/cli/src/blueprint.ts --compile --target=bun-linux-x64 --outfile dist/linux-x64/blueprint
          
          echo "Compiling macOS Intel (x64)..."
          bun build ./packages/cli/src/blueprint.ts --compile --target=bun-darwin-x64 --outfile dist/macos-x64/blueprint
          
          echo "Compiling macOS Apple Silicon (arm64)..."
          bun build ./packages/cli/src/blueprint.ts --compile --target=bun-darwin-arm64 --outfile dist/macos-arm64/blueprint
          
          echo "Compiling Windows (x64)..."
          bun build ./packages/cli/src/blueprint.ts --compile --target=bun-windows-x64 --outfile dist/windows-x64/blueprint.exe
          
          echo "Packaging archives..."
          tar -czf dist/blueprint-linux-x64.tar.gz -C dist/linux-x64 blueprint
          tar -czf dist/blueprint-macos-x64.tar.gz -C dist/macos-x64 blueprint
          tar -czf dist/blueprint-macos-arm64.tar.gz -C dist/macos-arm64 blueprint
          zip -j dist/blueprint-windows-x64.zip dist/windows-x64/blueprint.exe

      - name: Create GitHub Release
        if: steps.check_changes.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.new_tag }}
          name: Release ${{ steps.versioning.outputs.new_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/blueprint-linux-x64.tar.gz
            dist/blueprint-macos-x64.tar.gz
            dist/blueprint-macos-arm64.tar.gz
            dist/blueprint-windows-x64.zip

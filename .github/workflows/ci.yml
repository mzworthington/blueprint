name: CI & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Protobuf Compiler
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Generate TypeScript protobufs
        run: pnpm --filter @blueprint/cli generate:proto
        working-directory: app

      - name: Check Code Formatting
        run: pnpm format:check
        working-directory: app

      - name: Check Linting Rules
        run: pnpm lint
        working-directory: app

      - name: Check Unused Code & Dependencies (Knip)
        run: pnpm knip --reporter github-actions
        working-directory: app

      - name: Run Rust CLI Tests
        run: cargo test --manifest-path cli/Cargo.toml

      - name: Run Test Suite with Coverage
        run: pnpm test:coverage
        working-directory: app

      - name: Report Vitest Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: app/coverage/coverage-summary.json
          json-final-path: app/coverage/coverage-final.json

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @blueprint/designer exec playwright install --with-deps chromium
        working-directory: app

      - name: Run E2E Tests
        run: pnpm test:e2e
        working-directory: app

      - name: Upload Playwright Report & Screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            app/packages/designer/playwright-report/
            docs/screenshots/
          retention-days: 30

      - name: Compile Production Build
        run: pnpm build
        working-directory: app

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: './app/packages/designer/dist'

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  check-rust-cli-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      should_release: ${{ steps.check_changes.outputs.should_release }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Check if CLI or Proto files changed
        id: check_changes
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt || git show --name-only --pretty="" HEAD > changed_files.txt
          cat changed_files.txt
          
          if grep -qE '^(cli/|core/proto/)' changed_files.txt; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi


name: CI & Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Check Code Formatting
        run: pnpm format:check
        working-directory: app

      - name: Check Linting Rules
        run: pnpm lint
        working-directory: app

      - name: Check JSON Schema is up to date
        run: pnpm generate:schema -- --check
        working-directory: app

      - name: Check Unused Code & Dependencies (Knip)
        run: pnpm knip --reporter github-actions
        working-directory: app

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Run unit tests with coverage and features doc
        run: pnpm test:ci
        working-directory: app

      - name: Upload generated features doc
        uses: actions/upload-artifact@v7
        with:
          name: features-unit
          path: docs/features-unit.md

      - name: Report Vitest Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: app/coverage/coverage-summary.json
          json-final-path: app/coverage/coverage-final.json

  e2e:
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @blueprint/designer exec playwright install --with-deps chromium
        working-directory: app

      - name: Run E2E Tests
        run: pnpm test:e2e
        working-directory: app

      - name: Upload Playwright Report & Screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            app/packages/designer/playwright-report/
            app/packages/designer/test-results/
            docs/screenshots/
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Download generated features doc
        uses: actions/download-artifact@v8
        with:
          name: features-unit
          path: docs

      - name: Compile Production Build
        run: pnpm build
        working-directory: app

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: './app/packages/designer/dist'

  deploy:
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  check-ts-cli-release:
    needs: [build, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      should_release: ${{ steps.check_changes.outputs.should_release }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Check if TypeScript CLI files changed
        id: check_changes
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt || git show --name-only --pretty="" HEAD > changed_files.txt
          cat changed_files.txt

          if grep -qE '^app/packages/cli/' changed_files.txt; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build-ts-cli-binaries:
    needs: check-ts-cli-release
    if: needs.check-ts-cli-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: app

      - name: Compile TS CLI Binaries
        run: |
          mkdir -p dist/linux dist/macos-x64 dist/macos-arm64 dist/windows
          bun build app/packages/cli/src/cli/blueprint.ts --compile --target=bun-linux-x64 --outfile=dist/linux/blueprint
          bun build app/packages/cli/src/cli/blueprint.ts --compile --target=bun-darwin-x64 --outfile=dist/macos-x64/blueprint
          bun build app/packages/cli/src/cli/blueprint.ts --compile --target=bun-darwin-arm64 --outfile=dist/macos-arm64/blueprint
          bun build app/packages/cli/src/cli/blueprint.ts --compile --target=bun-windows-x64 --outfile=dist/windows/blueprint.exe
          bun app/packages/cli/scripts/copyTreeSitterWasms.ts \
            dist/linux dist/macos-x64 dist/macos-arm64 dist/windows

      - name: Package Archives
        run: |
          mkdir -p dist/archives
          tar -czf dist/archives/blueprint-linux-x64.tar.gz -C dist/linux .
          tar -czf dist/archives/blueprint-macos-x64.tar.gz -C dist/macos-x64 .
          tar -czf dist/archives/blueprint-macos-arm64.tar.gz -C dist/macos-arm64 .
          (cd dist/windows && zip -r ../archives/blueprint-windows-x64.zip .)

      - name: Upload TS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ts-cli-binaries
          path: dist/archives/

  publish-ts-release:
    needs: [check-ts-cli-release, build-ts-cli-binaries]
    if: needs.check-ts-cli-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download TS Artifacts
        uses: actions/download-artifact@v8
        with:
          name: ts-cli-binaries
          path: dist

      - name: Determine Next Version
        id: versioning
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --match "v*" --exclude "rust-v*" --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Latest tag found: $LATEST_TAG"
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_TAG="v$major.$minor.$NEW_PATCH"
          echo "Next release version: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.versioning.outputs.new_tag }}
          name: Release ${{ steps.versioning.outputs.new_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/blueprint-linux-x64.tar.gz
            dist/blueprint-macos-x64.tar.gz
            dist/blueprint-macos-arm64.tar.gz
            dist/blueprint-windows-x64.zip
            schemas/**/*.json

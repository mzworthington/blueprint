name: Release CLI Binary

on:
  workflow_run:
    workflows: ["CI & Deployment Pipeline"]
    types:
      - completed

permissions:
  contents: write

jobs:
  check-release-trigger:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_release: ${{ steps.check_changes.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check if CLI files changed
        id: check_changes
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt || git show --name-only --pretty="" HEAD > changed_files.txt
          cat changed_files.txt
          
          if grep -qE '^(packages/cli/src/analysis/|packages/cli/src/blueprint\.ts|packages/core/src/models/)' changed_files.txt; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  release-cli:
    needs: check-release-trigger
    if: ${{ needs.check-release-trigger.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0 # Fetch all history for tags resolving

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine Next Version
        id: versioning
        run: |
          git fetch --tags
          # Get latest tag, fallback to v0.1.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Latest tag found: $LATEST_TAG"
          
          # Remove 'v' prefix
          VERSION=${LATEST_TAG#v}
          
          # Parse major, minor, patch
          IFS='.' read -r major minor patch <<< "$VERSION"
          
          # Increment patch version
          NEW_PATCH=$((patch + 1))
          NEW_TAG="v$major.$minor.$NEW_PATCH"
          echo "Next release version: $NEW_TAG"
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Compile CLI Binaries (Cross-Platform)
        run: |
          mkdir -p dist/linux-x64 dist/macos-x64 dist/macos-arm64 dist/windows-x64
          
          echo "Compiling Linux (x64)..."
          bun build ./packages/cli/src/blueprint.ts --compile --target=bun-linux-x64 --outfile dist/linux-x64/blueprint
          
          echo "Compiling macOS Intel (x64)..."
          bun build ./packages/cli/src/blueprint.ts --compile --target=bun-darwin-x64 --outfile dist/macos-x64/blueprint
          
          echo "Compiling macOS Apple Silicon (arm64)..."
          bun build ./packages/cli/src/blueprint.ts --compile --target=bun-darwin-arm64 --outfile dist/macos-arm64/blueprint
          
          echo "Compiling Windows (x64)..."
          bun build ./packages/cli/src/blueprint.ts --compile --target=bun-windows-x64 --outfile dist/windows-x64/blueprint.exe
          
          echo "Packaging archives..."
          tar -czf dist/blueprint-linux-x64.tar.gz -C dist/linux-x64 blueprint
          tar -czf dist/blueprint-macos-x64.tar.gz -C dist/macos-x64 blueprint
          tar -czf dist/blueprint-macos-arm64.tar.gz -C dist/macos-arm64 blueprint
          zip -j dist/blueprint-windows-x64.zip dist/windows-x64/blueprint.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.new_tag }}
          name: Release ${{ steps.versioning.outputs.new_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/blueprint-linux-x64.tar.gz
            dist/blueprint-macos-x64.tar.gz
            dist/blueprint-macos-arm64.tar.gz
            dist/blueprint-windows-x64.zip

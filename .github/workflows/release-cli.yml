name: Release CLI Binary

on:
  push:
    branches:
      - main
    paths:
      - 'cli/analysis/**'
      - 'cli/blueprint.ts'

permissions:
  contents: write

jobs:
  release-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for tags resolving

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine Next Version
        id: versioning
        run: |
          git fetch --tags
          # Get latest tag, fallback to v0.1.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Latest tag found: $LATEST_TAG"
          
          # Remove 'v' prefix
          VERSION=${LATEST_TAG#v}
          
          # Parse major, minor, patch
          IFS='.' read -r major minor patch <<< "$VERSION"
          
          # Increment patch version
          NEW_PATCH=$((patch + 1))
          NEW_TAG="v$major.$minor.$NEW_PATCH"
          echo "Next release version: $NEW_TAG"
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Compile CLI Binaries (Cross-Platform)
        run: |
          mkdir -p dist
          echo "Compiling Linux (x64)..."
          bun build ./cli/blueprint.ts --compile --target=bun-linux-x64 --outfile dist/blueprint-cli-linux-x64
          echo "Compiling macOS Intel (x64)..."
          bun build ./cli/blueprint.ts --compile --target=bun-darwin-x64 --outfile dist/blueprint-cli-macos-x64
          echo "Compiling macOS Apple Silicon (arm64)..."
          bun build ./cli/blueprint.ts --compile --target=bun-darwin-arm64 --outfile dist/blueprint-cli-macos-arm64
          echo "Compiling Windows (x64)..."
          bun build ./cli/blueprint.ts --compile --target=bun-windows-x64 --outfile dist/blueprint-cli-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.new_tag }}
          name: Release ${{ steps.versioning.outputs.new_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/blueprint-cli-linux-x64
            dist/blueprint-cli-macos-x64
            dist/blueprint-cli-macos-arm64
            dist/blueprint-cli-windows-x64.exe

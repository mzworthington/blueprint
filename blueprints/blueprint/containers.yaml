name: Blueprint - Container Level
version: 1.0.0
level: container
nodes:
  - id: frontend-client
    type: gateway-api
    name: Frontend Client Host
    properties:
      description: Vite app hosting server.
      technology: Vite + React
    x: 1085
    'y': 60
  - id: domain-logic
    type: background-worker
    name: Domain Logic Layer
    properties:
      description: Core domain logic, schema validation rules, and graph parsing.
      technology: TypeScript
    c4Ref: ./domain-logic-components.yaml
    x: 1140
    'y': 1540
  - id: app
    type: background-worker
    name: app
    properties:
      description: Core domain services for app
      technology: TypeScript
    c4Ref: ./app-components.yaml
    x: 150
    'y': 430
  - id: app_test_tsx
    type: background-worker
    name: App.test.tsx
    properties:
      description: Core domain services for App.test.tsx
      technology: TypeScript
    c4Ref: ./app_test_tsx-components.yaml
    x: 670
    'y': 430
  - id: app_tsx
    type: background-worker
    name: App.tsx
    properties:
      description: Core domain services for App.tsx
      technology: TypeScript
    c4Ref: ./app_tsx-components.yaml
    x: 620
    'y': 800
  - id: setuptests_ts
    type: background-worker
    name: setupTests.ts
    properties:
      description: Core domain services for setupTests.ts
      technology: TypeScript
    c4Ref: ./setuptests_ts-components.yaml
    x: 1605
    'y': 60
  - id: tests
    type: background-worker
    name: tests
    properties:
      description: Core domain services for tests
      technology: TypeScript
    c4Ref: ./tests-components.yaml
    x: 985
    'y': 1170
  - id: blueprint_ts
    type: background-worker
    name: blueprint.ts
    properties:
      description: Core domain services for blueprint.ts
      technology: TypeScript
    c4Ref: ./blueprint_ts-components.yaml
    x: 1295
    'y': 800
  - id: analysis
    type: background-worker
    name: analysis
    properties:
      description: Core domain services for analysis
      technology: TypeScript
    c4Ref: ./analysis-components.yaml
    x: 1715
    'y': 1170
  - id: frontend-ui
    type: gateway-api
    name: Frontend React UI
    properties:
      description: React Flow canvas, sidebar configuration panel, and navigation UI.
      technology: React + TailwindCSS
    c4Ref: ./frontend-ui-components.yaml
    x: 1450
    'y': 430
  - id: state-sync
    type: cache-store
    name: State & Sync Manager
    properties:
      description: Zustand global store and local directory synchronization.
      technology: Zustand / Filesystem API
    c4Ref: ./state-sync-components.yaml
    x: 1815
    'y': 800
  - id: csharp
    type: background-worker
    name: csharp
    properties:
      description: Core domain services for csharp
      technology: C# / .NET
    c4Ref: ./csharp-components.yaml
    x: 2125
    'y': 60
dependencies:
  - from: frontend-client
    to: app
    type: direct-call
    description: Inter-container request / connection
  - from: app_test_tsx
    to: app_tsx
    type: direct-call
    description: Inter-container request / connection
  - from: app_test_tsx
    to: state-sync
    type: direct-call
    description: Inter-container request / connection
  - from: tests
    to: domain-logic
    type: direct-call
    description: Inter-container request / connection
  - from: blueprint_ts
    to: domain-logic
    type: direct-call
    description: Inter-container request / connection
  - from: blueprint_ts
    to: analysis
    type: direct-call
    description: Inter-container request / connection
  - from: frontend-client
    to: frontend-ui
    type: direct-call
    description: Inter-container request / connection
  - from: frontend-ui
    to: state-sync
    type: direct-call
    description: Inter-container request / connection
  - from: frontend-client
    to: state-sync
    type: direct-call
    description: Inter-container request / connection
  - from: analysis
    to: domain-logic
    type: direct-call
    description: Inter-container request / connection
  - from: state-sync
    to: analysis
    type: direct-call
    description: Inter-container request / connection

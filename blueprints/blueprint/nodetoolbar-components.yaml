name: Blueprint - NodeToolbar Components
version: 1.0.0
level: component
nodes:
  - id: nodetoolbar_d
    type: background-worker
    name: NodeToolbar.d Service
    isTest: false
    properties:
      filepath: node_modules/@xyflow/react/dist/umd/additional-components/NodeToolbar/NodeToolbar.d.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: false
    x: 140
    'y': 50
  - id: nodetoolbarportal_d
    type: gateway-api
    name: NodeToolbarPortal.d UI Component
    isTest: false
    properties:
      filepath: node_modules/@xyflow/react/dist/umd/additional-components/NodeToolbar/NodeToolbarPortal.d.ts
      namespaces: ''
      technology: React Component
    external: false
    x: 600
    'y': 370
  - id: types
    type: background-worker
    name: types Service (v3)
    isTest: false
    properties:
      filepath: node_modules/zod/src/v3/types.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 140
    'y': 370
  - id: frontend-client
    type: gateway-api
    name: Frontend Client App (Frontend Client Host)
    properties:
      description: The main user interface running React and Vite.
      technology: React + TypeScript
    external: true
    x: 600
    'y': 50
dependencies:
  - from: nodetoolbar_d
    to: types
    type: direct-call
    description: Executes local class methods / functions
  - from: frontend-client
    to: nodetoolbarportal_d
    type: direct-call
    description: Renders NodeToolbarPortal.d layout component
  - from: frontend-client
    to: nodetoolbarportal_d
    type: direct-call
    description: Renders NodeToolbarPortal.d layout component

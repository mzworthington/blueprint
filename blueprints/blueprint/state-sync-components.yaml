name: Blueprint - State & Sync Manager Components
version: 1.0.0
level: component
nodes:
  - id: filesync_test
    type: background-worker
    name: fileSync.test Service
    isTest: true
    properties:
      filepath: src/adapters/fileSync.test.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: false
    x: 140
    'y': 50
  - id: filesync
    type: background-worker
    name: fileSync Service
    isTest: false
    properties:
      filepath: src/adapters/fileSync.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: false
    x: 180
    'y': 370
  - id: telemetry
    type: background-worker
    name: telemetry Service
    isTest: false
    properties:
      filepath: src/adapters/telemetry.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: false
    x: 680
    'y': 370
  - id: ioslice
    type: background-worker
    name: ioSlice Service (store)
    isTest: false
    properties:
      filepath: src/store/slices/ioSlice.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 640
    'y': 50
  - id: ports
    type: background-worker
    name: ports Service (Domain Logic Layer)
    isTest: false
    properties:
      filepath: src/domain/ports.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 180
    'y': 690
dependencies:
  - from: filesync_test
    to: filesync
    type: direct-call
    description: Executes local class methods / functions
  - from: ioslice
    to: filesync
    type: direct-call
    description: Executes local class methods / functions
  - from: ioslice
    to: telemetry
    type: direct-call
    description: Executes local class methods / functions
  - from: filesync
    to: ports
    type: direct-call
    description: Implements FileSystemPort interface

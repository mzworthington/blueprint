# yaml-language-server: $schema=https://blueprint.mzworthington.co.uk/schemas/v2/blueprint.schema.json
- entityRef: blueprint/cli/core
  name: Core Service Components
  version: 1.0.0
  level: component
  nodes:
    - entityRef: blueprint/cli/core/vitest-config
      type: background-worker
      name: vitest.config Service
      isTest: false
      properties:
        filepath: vitest.config.ts
        containerId: core
        technology: TypeScript Domain Service
        classification: default
      x: 40
      y: 40
      forensics:
        complexity: 1
        loc: 10
        sloc: 8
        churn: 1
        authorCount: 1
        topAuthorPercent: 1
        hotspotScore: 0
        sinceDays: 90
    - entityRef: blueprint/cli/core/vitest-vhs-config
      type: background-worker
      name: vitest.vhs.config Service
      isTest: false
      properties:
        filepath: vitest.vhs.config.ts
        containerId: core
        technology: TypeScript Domain Service
        classification: default
      x: 400
      y: 40
      forensics:
        complexity: 1
        loc: 13
        sloc: 11
        churn: 1
        authorCount: 1
        topAuthorPercent: 1
        hotspotScore: 0
        sinceDays: 90
    - entityRef: blueprint/cli/core/fakes
      type: background-worker
      name: fakes Service
      isTest: true
      properties:
        filepath: src/test/fakes.ts
        containerId: core
        technology: TypeScript Domain Service
        classification: default
      x: 40
      y: 300
      forensics:
        complexity: 9
        loc: 123
        sloc: 105
        churn: 3
        authorCount: 1
        topAuthorPercent: 1
        hotspotScore: 0.02735042735042735
        sinceDays: 90
  dependencies:
    - from: blueprint/cli/core/fakes
      to: blueprint/cli/analysis/ports
      type: direct-call
      description: Calls module / service
    - from: blueprint/cli/core/fakes
      to: blueprint/cli/analysis/types
      type: direct-call
      description: Calls module / service
    - from: blueprint/cli/writers/basewriter-test
      to: blueprint/cli/core/fakes
      type: direct-call
      description: Calls module / service
    - from: blueprint/cli/writers/componentlevelwriter-test
      to: blueprint/cli/core/fakes
      type: direct-call
      description: Calls module / service
    - from: blueprint/cli/writers/containerlevelwriter-test
      to: blueprint/cli/core/fakes
      type: direct-call
      description: Calls module / service
    - from: blueprint/cli/writers/contextlevelwriter-test
      to: blueprint/cli/core/fakes
      type: direct-call
      description: Calls module / service
    - from: blueprint/cli/analysis/analyzer-test
      to: blueprint/cli/core/fakes
      type: direct-call
      description: Calls module / service

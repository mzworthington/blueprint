# yaml-language-server: $schema=https://blueprint.mzworthington.co.uk/schemas/v1/blueprint.schema.json
entityRef: blueprint/app/app
name: App Service Components
version: 1.0.0
level: component
nodes:
  - entityRef: blueprint/app/app/vitest-config
    type: background-worker
    name: vitest.config Service
    isTest: false
    properties:
      filepath: app/vitest.config.ts
      containerId: app
      technology: TypeScript Domain Service
      classification: default
    forensics:
      complexity: 1
      loc: 13
      sloc: 11
      churn: 1
      authorCount: 1
      topAuthorPercent: 1
      hotspotScore: 0
      classifications: []
      coupledFiles: []
      sinceDays: 90
    x: 40
    'y': 40
dependencies: []

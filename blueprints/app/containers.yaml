# yaml-language-server: $schema=../../schemas/v2/blueprint.schema.json
- entityRef: blueprint/app
  name: App Containers
  version: 1.0.0
  level: container
  nodes:
    - entityRef: blueprint/app/core
      type: container
      name: Core Service
      isTest: false
      x: 428
      y: 384
    - entityRef: blueprint/app/cli
      type: container
      name: Cli Service
      isTest: false
      x: 428
      y: 64
    - entityRef: blueprint/app/designer
      type: container
      name: Designer Service
      isTest: false
      x: 808
      y: 64
    - entityRef: blueprint/app/app
      type: container
      name: App Service
      isTest: false
      x: 48
      y: 64
  dependencies:

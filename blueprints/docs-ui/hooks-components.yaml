# yaml-language-server: $schema=../../schemas/v2/blueprint.schema.json
- entityRef: blueprint/docs-ui/hooks
  name: Hooks Service Components
  version: 1.0.0
  level: component
  nodes:
    - entityRef: blueprint/docs-ui/hooks/usecurrentpage
      type: background-worker
      name: useCurrentPage Service
      isTest: false
      properties:
        filepath: docs-ui/src/hooks/useCurrentPage.ts
        containerId: hooks
        technology: TypeScript Domain Service
        classification: default
      x: 40
      y: 40
      forensics:
        complexity: 5
        loc: 32
        sloc: 23
        churn: 1
        authorCount: 1
        topAuthorPercent: 1
        hotspotScore: 0
        sinceDays: 500
  dependencies:
    - from: blueprint/docs-ui/hooks/usecurrentpage
      to: blueprint/docs-ui/components/navigation
      type: direct-call
      description: Calls module / service
    - from: blueprint/docs-ui/hooks/usecurrentpage
      to: blueprint/docs-ui/docs-ui/getpagename
      type: direct-call
      description: Calls module / service

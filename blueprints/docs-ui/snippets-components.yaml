# yaml-language-server: $schema=../../schemas/v2/blueprint.schema.json
- entityRef: blueprint/docs-ui/snippets
  name: Snippets Service Components
  version: 1.0.0
  level: component
  nodes:
    - entityRef: blueprint/docs-ui/snippets/code-snippets
      type: background-worker
      name: code-snippets Service
      isTest: false
      properties:
        filepath: docs-ui/src/snippets/code-snippets.ts
        containerId: snippets
        technology: TypeScript Domain Service
        classification: default
      x: 40
      y: 40
      forensics:
        complexity: 1
        loc: 33
        sloc: 23
        churn: 1
        authorCount: 1
        topAuthorPercent: 1
        hotspotScore: 0
        sinceDays: 500
  dependencies: []

# yaml-language-server: $schema=../../schemas/v2/blueprint.schema.json
- entityRef: blueprint/plugins/devtools-react
  name: Devtools-react Service Components
  version: 1.0.0
  level: component
  nodes:
    - entityRef: blueprint/plugins/devtools-react/index
      type: background-worker
      name: index Service
      isTest: false
      properties:
        filepath: plugins/devtools-react/src/index.ts
        containerId: devtools-react
        technology: TypeScript Domain Service
        classification: default
      x: 40
      y: 40
      forensics:
        complexity: 1
        loc: 24
        sloc: 1
        churn: 1
        authorCount: 1
        topAuthorPercent: 1
        hotspotScore: 0
        sinceDays: 500
  dependencies: []

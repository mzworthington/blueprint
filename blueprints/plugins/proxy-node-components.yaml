# yaml-language-server: $schema=../../schemas/v2/blueprint.schema.json
- entityRef: blueprint/plugins/proxy-node
  name: Proxy-node Service Components
  version: 1.0.0
  level: component
  nodes:
    - entityRef: blueprint/plugins/proxy-node/index
      type: background-worker
      name: index Service
      isTest: false
      properties:
        filepath: plugins/proxy-node/src/alpha/index.ts
        containerId: proxy-node
        technology: TypeScript Domain Service
        classification: default
      x: 40
      y: 40
      forensics:
        complexity: 1
        loc: 49
        sloc: 15
        churn: 1
        authorCount: 1
        topAuthorPercent: 1
        hotspotScore: 0
        sinceDays: 500
  dependencies: []

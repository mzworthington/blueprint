version: https://blueprint.mzworthington.co.uk/schemas/v3/blueprint.schema.json
level: component
metaData:
  entityRef: blueprint/eshop/orderprocessor
  name: OrderProcessor Service Components
  source:
    remoteUrl: https://github.com/dotnet/eShop
    defaultBranch: main
    scannedAtCommit: 9b4f9434f46fdc5c1a6e9e936af2868340cdbc48
    scanRoot: .
nodes:
  - entityRef: blueprint/eshop/orderprocessor/extensions
    type: background-worker
    name: Extensions Layer
    isTest: false
    properties:
      filepath: src/OrderProcessor/Extensions/Extensions.cs
      containerId: orderprocessor
      technology: C# Domain Service
      classification: default
  - entityRef: blueprint/eshop/orderprocessor/backgroundtaskoptions
    type: background-worker
    name: BackgroundTaskOptions
    isTest: false
    properties:
      filepath: src/OrderProcessor/BackgroundTaskOptions.cs
      containerId: orderprocessor
      technology: C# Domain Service
      classification: default
  - entityRef: blueprint/eshop/orderprocessor/events
    type: background-worker
    name: Events Layer
    isTest: false
    properties:
      filepath: src/OrderProcessor/Events/GracePeriodConfirmedIntegrationEvent.cs
      containerId: orderprocessor
      technology: C# Domain Service
      classification: default
  - entityRef: blueprint/eshop/orderprocessor/services
    type: relational-database
    name: Services Layer
    isTest: false
    properties:
      filepath: src/OrderProcessor/Services/GracePeriodManagerService.cs
      containerId: orderprocessor
      technology: Entity Framework / DB Context
      classification: database-marker
  - entityRef: blueprint/eshop/orderprocessor/program
    type: background-worker
    name: Program
    isTest: false
    properties:
      filepath: src/OrderProcessor/Program.cs
      containerId: orderprocessor
      technology: C# Domain Service
      classification: default
  - entityRef: blueprint/eshop/eventbus/abstractions
    type: event-broker
    name: Abstractions Layer (External)
    external: true
    properties:
      filepath: src/EventBus/Abstractions/IEventBusBuilder.cs
      containerId: eventbus
      technology: C# Event Client
      classification: event-marker
    x: 280
    y: 100
  - entityRef: blueprint/eshop/eventbus/events
    type: background-worker
    name: Events Layer (External)
    external: true
    properties:
      filepath: src/EventBus/Events/IntegrationEvent.cs
      containerId: eventbus
      technology: C# Domain Service
      classification: default
    x: 460
    y: 100
dependencies:
  - from: blueprint/eshop/orderprocessor/extensions
    to: blueprint/eshop/orderprocessor/events
    type: direct-call
    description: Calls module / service
  - from: blueprint/eshop/orderprocessor/events
    to: blueprint/eshop/eventbus/events
    type: direct-call
    description: Calls module / service
  - from: blueprint/eshop/orderprocessor/services
    to: blueprint/eshop/eventbus/abstractions
    type: publish-subscribe
    description: Publishes / consumes messaging topics
  - from: blueprint/eshop/orderprocessor/services
    to: blueprint/eshop/orderprocessor/events
    type: direct-call
    description: Calls module / service

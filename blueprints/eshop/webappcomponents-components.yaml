# yaml-language-server: $schema=../../schemas/v2/blueprint.schema.json
- entityRef: blueprint/eshop/webappcomponents
  name: WebAppComponents Service Components
  version: 1.0.0
  level: component
  nodes:
    - entityRef: blueprint/eshop/webappcomponents/catalog
      type: background-worker
      name: Catalog Layer
      isTest: false
      properties:
        filepath: src/WebAppComponents/Catalog/CatalogItem.cs
        containerId: webappcomponents
        technology: C# Domain Service
        classification: default
      x: 40
      y: 40
    - entityRef: blueprint/eshop/webappcomponents/item
      type: background-worker
      name: Item Layer
      isTest: false
      properties:
        filepath: src/WebAppComponents/Item/ItemHelper.cs
        containerId: webappcomponents
        technology: C# Domain Service
        classification: default
      x: 400
      y: 40
    - entityRef: blueprint/eshop/webappcomponents/services
      type: background-worker
      name: Services Layer
      isTest: false
      properties:
        filepath: src/WebAppComponents/Services/IProductImageUrlProvider.cs
        containerId: webappcomponents
        technology: C# Domain Service
        classification: default
      x: 40
      y: 300
  dependencies: []

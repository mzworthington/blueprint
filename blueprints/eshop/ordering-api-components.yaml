version: https://blueprint.mzworthington.co.uk/schemas/v3/blueprint.schema.json
level: component
metaData:
  entityRef: blueprint/eshop/ordering-api
  name: Ordering.API Service Components
  source:
    remoteUrl: https://github.com/dotnet/eShop
    defaultBranch: main
    scannedAtCommit: 9b4f9434f46fdc5c1a6e9e936af2868340cdbc48
    scanRoot: .
nodes:
  - entityRef: blueprint/eshop/ordering-api/program-testing
    type: background-worker
    name: Program.Testing
    isTest: false
    properties:
      filepath: src/Ordering.API/Program.Testing.cs
      containerId: ordering-api
      technology: C# Domain Service
      classification: default
  - entityRef: blueprint/eshop/ordering-api/apis
    type: rest-api
    name: Apis Layer
    isTest: false
    properties:
      filepath: src/Ordering.API/Apis/OrderServices.cs
      containerId: ordering-api
      technology: ASP.NET Core Controller / Minimal API
      classification: api-marker
  - entityRef: blueprint/eshop/ordering-api/extensions
    type: background-worker
    name: Extensions Layer
    isTest: false
    properties:
      filepath: src/Ordering.API/Extensions/LinqSelectExtensions.cs
      containerId: ordering-api
      technology: C# Domain Service
      classification: default
  - entityRef: blueprint/eshop/ordering-api/application
    type: event-broker
    name: Application Layer
    isTest: false
    properties:
      filepath: src/Ordering.API/Application/Queries/OrderQueries.cs
      containerId: ordering-api
      technology: C# Event Client
      classification: event-marker
  - entityRef: blueprint/eshop/ordering-api/infrastructure
    type: background-worker
    name: Infrastructure Layer
    isTest: false
    properties:
      filepath: src/Ordering.API/Infrastructure/OrderingContextSeed.cs
      containerId: ordering-api
      technology: C# Domain Service
      classification: default
  - entityRef: blueprint/eshop/ordering-api/program
    type: background-worker
    name: Program
    isTest: false
    properties:
      filepath: src/Ordering.API/Program.cs
      containerId: ordering-api
      technology: C# Domain Service
      classification: default
  - entityRef: blueprint/eshop/ordering-domain/aggregatesmodel
    type: relational-database
    name: AggregatesModel Layer (External)
    external: true
    properties:
      filepath: src/Ordering.Domain/AggregatesModel/OrderAggregate/Order.cs
      containerId: ordering-domain
      technology: Entity Framework / DB Context
      classification: database-marker
    x: 280
    y: 100
  - entityRef: blueprint/eshop/ordering-unittests/application
    type: rest-api
    name: Application Layer (External)
    external: true
    properties:
      filepath: tests/Ordering.UnitTests/Application/NewOrderCommandHandlerTest.cs
      containerId: ordering-unittests
      technology: ASP.NET Core Controller / Minimal API
      classification: api-marker
    x: 460
    y: 100
  - entityRef: blueprint/eshop/ordering-functionaltests/orderingapitests
    type: rest-api
    name: OrderingApiTests (External)
    external: true
    properties:
      filepath: tests/Ordering.FunctionalTests/OrderingApiTests.cs
      containerId: ordering-functionaltests
      technology: ASP.NET Core Controller / Minimal API
      classification: api-marker
    x: 100
    y: 220
dependencies:
  - from: blueprint/eshop/ordering-unittests/application
    to: blueprint/eshop/ordering-api/application
    type: publish-subscribe
    description: Publishes / consumes messaging topics
  - from: blueprint/eshop/ordering-functionaltests/orderingapitests
    to: blueprint/eshop/ordering-api/application
    type: publish-subscribe
    description: Publishes / consumes messaging topics
  - from: blueprint/eshop/ordering-api/application
    to: blueprint/eshop/ordering-api/extensions
    type: direct-call
    description: Calls module / service
  - from: blueprint/eshop/ordering-api/application
    to: blueprint/eshop/ordering-domain/aggregatesmodel
    type: read-write
    description: Queries datastore records
  - from: blueprint/eshop/ordering-api/infrastructure
    to: blueprint/eshop/ordering-domain/aggregatesmodel
    type: read-write
    description: Queries datastore records

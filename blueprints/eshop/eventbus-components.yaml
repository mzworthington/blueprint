# yaml-language-server: $schema=../../schemas/v2/blueprint.schema.json
- entityRef: blueprint/eshop/eventbus
  name: EventBus Service Components
  version: 1.0.0
  level: component
  nodes:
    - entityRef: blueprint/eshop/eventbus/abstractions
      type: event-broker
      name: Abstractions Layer
      isTest: false
      properties:
        filepath: src/EventBus/Abstractions/IEventBusBuilder.cs
        containerId: eventbus
        technology: C# Event Client
        classification: event-marker
      x: 40
      y: 40
    - entityRef: blueprint/eshop/eventbus/events
      type: background-worker
      name: Events Layer
      isTest: false
      properties:
        filepath: src/EventBus/Events/IntegrationEvent.cs
        containerId: eventbus
        technology: C# Domain Service
        classification: default
      x: 400
      y: 40
    - entityRef: blueprint/eshop/eventbus/extensions
      type: background-worker
      name: Extensions Layer
      isTest: false
      properties:
        filepath: src/EventBus/Extensions/GenericTypeExtensions.cs
        containerId: eventbus
        technology: C# Domain Service
        classification: default
      x: 40
      y: 300
  dependencies: []

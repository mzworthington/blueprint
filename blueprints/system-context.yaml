name: Internet Banking - System Context
version: 1.0.0
level: context
nodes:
  - id: user
    type: person
    name: Customer
    external: true
    x: 100
    y: 150
  - id: banking-system
    type: software-system
    name: Internet Banking System
    c4Ref: ./internet-banking-container.yaml
    x: 400
    y: 150
  - id: mainframe
    type: software-system
    name: Core Mainframe System
    external: true
    x: 700
    y: 150
dependencies:
  - from: user
    to: banking-system
    type: direct-call
    description: Uses banking features
  - from: banking-system
    to: mainframe
    type: direct-call
    description: Gets account information

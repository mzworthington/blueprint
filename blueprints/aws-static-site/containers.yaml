version: https://blueprint.mzworthington.co.uk/schemas/v3/blueprint.schema.json
level: container
metaData:
  entityRef: blueprint/aws-static-site
  name: Aws-static-site Infrastructure
nodes:
  - entityRef: blueprint/aws-static-site/random-string-s3-read-password
    type: container
    name: s3_read_password
    external: false
    properties:
      iac.address: random_string.s3_read_password
      iac.provider_type: random_string
      iac.kind: resource
    x: 760
    y: 300
  - entityRef: blueprint/aws-static-site/data-aws-route53-zone-this
    type: container
    name: this
    external: true
    properties:
      iac.address: data.aws_route53_zone.this
      iac.provider_type: aws_route53_zone
      iac.kind: data
    x: 40
    y: 300
  - entityRef: blueprint/aws-static-site/module-aws-reverse-proxy
    type: container
    name: aws_reverse_proxy
    external: true
    properties:
      iac.address: module.aws_reverse_proxy
      iac.provider_type: module
      iac.kind: module
      iac.source: git::ssh://git@github.com/futurice/terraform-utils.git//aws_reverse_proxy?ref=v11.0
    x: 400
    y: 300
  - entityRef: blueprint/aws-static-site/aws-s3-bucket-this
    type: container
    name: this
    external: false
    properties:
      iac.address: aws_s3_bucket.this
      iac.provider_type: aws_s3_bucket
      iac.kind: resource
    x: 400
    y: 40
  - entityRef: blueprint/aws-static-site/aws-s3-bucket-policy-this
    type: container
    name: this
    external: false
    properties:
      iac.address: aws_s3_bucket_policy.this
      iac.provider_type: aws_s3_bucket_policy
      iac.kind: resource
    x: 40
    y: 40
  - entityRef: blueprint/aws-static-site/data-aws-region-current
    type: container
    name: current
    external: true
    properties:
      iac.address: data.aws_region.current
      iac.provider_type: aws_region
      iac.kind: data
    x: 760
    y: 40
dependencies:
  - from: blueprint/aws-static-site/module-aws-reverse-proxy
    to: blueprint/aws-static-site/random-string-s3-read-password
    type: direct-call
  - from: blueprint/aws-static-site/aws-s3-bucket-policy-this
    to: blueprint/aws-static-site/random-string-s3-read-password
    type: direct-call

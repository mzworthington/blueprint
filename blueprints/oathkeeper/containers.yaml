  - from: blueprint/oathkeeper/google-cloud-run-service-iam-policy-noauth
    to: blueprint/oathkeeper/data-google-iam-policy-noauth
    type: direct-call
  - from: blueprint/oathkeeper/google-storage-bucket-object-rules
    to: blueprint/oathkeeper/google-storage-bucket-config
    type: direct-call
  - from: blueprint/oathkeeper/google-storage-bucket-iam-member-oathkeeper-viewer
    to: blueprint/oathkeeper/google-storage-bucket-config
    type: direct-call
  - from: blueprint/oathkeeper/google-cloud-run-service-oathkeeper
    to: blueprint/oathkeeper/google-storage-bucket-object-rules
    type: direct-call
  - from: blueprint/oathkeeper/google-cloud-run-service-oathkeeper
    to: blueprint/oathkeeper/google-service-account-oathkeeper
    type: direct-call
  - from: blueprint/oathkeeper/google-cloud-run-service-oathkeeper
    to: blueprint/oathkeeper/null-resource-oathkeeper-image
    type: direct-call
  - from: blueprint/oathkeeper/google-cloud-run-service-oathkeeper
    to: blueprint/oathkeeper/google-storage-bucket-config
    type: direct-call
  - from: blueprint/oathkeeper/null-resource-oathkeeper-image
    to: blueprint/oathkeeper/local-file-dockerfile
    type: direct-call
  - from: blueprint/oathkeeper/null-resource-oathkeeper-image
    to: blueprint/oathkeeper/local-file-config
    type: direct-call

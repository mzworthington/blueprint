name: Backstage - examples Components
version: 1.0.0
level: component
nodes:
  - id: pagesplugin
    type: gateway-api
    name: pagesPlugin UI Component
    isTest: false
    properties:
      filepath: packages/app/src/examples/pagesPlugin.tsx
      namespaces: ''
      technology: React Component
    external: false
    x: 140
    'y': 370
  - id: notfounderrorpageextension
    type: gateway-api
    name: notFoundErrorPageExtension UI Component
    isTest: false
    properties:
      filepath: packages/app/src/examples/notFoundErrorPageExtension.tsx
      namespaces: ''
      technology: React Component
    external: false
    x: 600
    'y': 370
  - id: frontend-client
    type: gateway-api
    name: Frontend Client App (Frontend Client Host)
    properties:
      description: The main user interface running React and Vite.
      technology: React + TypeScript
    external: true
    x: 370
    'y': 50
  - id: box
    type: gateway-api
    name: Box UI Component (components)
    isTest: false
    properties:
      filepath: packages/ui/src/components/Box/Box.tsx
      namespaces: ''
      technology: React Component
    external: true
    x: 600
    'y': 690
dependencies:
  - from: frontend-client
    to: pagesplugin
    type: direct-call
    description: Renders pagesPlugin layout component
  - from: frontend-client
    to: notfounderrorpageextension
    type: direct-call
    description: Renders notFoundErrorPageExtension layout component
  - from: notfounderrorpageextension
    to: box
    type: direct-call
    description: Executes local class methods / functions

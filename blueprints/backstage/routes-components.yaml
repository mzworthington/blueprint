name: Backstage - routes Components
version: 1.0.0
level: component
nodes:
  - id: resourcesroutes
    type: rest-api
    name: resourcesRoutes REST Endpoint
    isTest: false
    properties:
      filepath: plugins/kubernetes-backend/src/routes/resourcesRoutes.ts
      namespaces: ''
      technology: REST Controller / Router
    external: false
    x: 600
    'y': 370
  - id: resourceroutes_test
    type: background-worker
    name: resourceRoutes.test Service
    isTest: true
    properties:
      filepath: plugins/kubernetes-backend/src/routes/resourceRoutes.test.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: false
    x: 1060
    'y': 50
  - id: kubernetesrouter
    type: rest-api
    name: KubernetesRouter REST Endpoint (service)
    isTest: false
    properties:
      filepath: plugins/kubernetes-backend/src/service/KubernetesRouter.ts
      namespaces: ''
      technology: REST Controller / Router
    external: true
    x: 140
    'y': 50
  - id: frontend-client
    type: gateway-api
    name: Frontend Client App (Frontend Client Host)
    properties:
      description: The main user interface running React and Vite.
      technology: React + TypeScript
    external: true
    x: 600
    'y': 50
  - id: errors
    type: background-worker
    name: errors Service (errors.ts)
    isTest: false
    properties:
      filepath: packages/codemods/src/errors.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 140
    'y': 690
  - id: express
    type: rest-api
    name: express REST Endpoint (types)
    isTest: false
    properties:
      filepath: packages/backend-openapi-utils/src/types/express.ts
      namespaces: ''
      technology: REST Controller / Router
    external: true
    x: 600
    'y': 690
  - id: requirepermission
    type: gateway-api
    name: RequirePermission UI Component (components)
    isTest: false
    properties:
      filepath: plugins/permission-react/src/components/RequirePermission.tsx
      namespaces: ''
      technology: React Component
    external: true
    x: 1060
    'y': 690
  - id: error
    type: background-worker
    name: error Service (serialization)
    isTest: false
    properties:
      filepath: packages/errors/src/serialization/error.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 1060
    'y': 370
dependencies:
  - from: kubernetesrouter
    to: resourcesroutes
    type: direct-call
    description: Executes local class methods / functions
  - from: frontend-client
    to: resourcesroutes
    type: direct-call
    description: Hits API routing gateway
  - from: resourcesroutes
    to: errors
    type: direct-call
    description: Executes local class methods / functions
  - from: resourcesroutes
    to: express
    type: direct-call
    description: Executes local class methods / functions
  - from: resourcesroutes
    to: requirepermission
    type: direct-call
    description: Executes local class methods / functions
  - from: resourceroutes_test
    to: error
    type: direct-call
    description: References class type / calls methods

  - from: passporthelpers
    to: express
    type: direct-call
    description: Executes local class methods / functions
  - from: passporthelpers
    to: types
    type: direct-call
    description: Executes local class methods / functions
  - from: passporthelpers
    to: errors
    type: direct-call
    description: Executes local class methods / functions

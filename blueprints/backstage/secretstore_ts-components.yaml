name: Backstage - secretStore.ts Components
version: 1.0.0
level: component
nodes:
  - id: secretstore
    type: background-worker
    name: secretStore Service
    isTest: false
    properties:
      filepath: packages/cli-internal/src/secretStore.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: false
    x: 370
    'y': 370
  - id: cliauth
    type: background-worker
    name: CliAuth Service (auth)
    isTest: false
    properties:
      filepath: packages/cli-node/src/auth/CliAuth.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 140
    'y': 50
  - id: cliauth_test
    type: background-worker
    name: CliAuth.test Service (auth)
    isTest: true
    properties:
      filepath: packages/cli-node/src/auth/CliAuth.test.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 600
    'y': 50
dependencies:
  - from: cliauth
    to: secretstore
    type: direct-call
    description: Executes local class methods / functions
  - from: cliauth_test
    to: secretstore
    type: direct-call
    description: Executes local class methods / functions

name: Backstage - microsite Components
version: 1.0.0
level: component
nodes:
  - id: docusaurus_config
    type: gateway-api
    name: docusaurus.config UI Component
    isTest: false
    properties:
      filepath: ../backstage/microsite/docusaurus.config.ts
      namespaces: ''
      technology: React Component
    external: false
    x: 1060
    'y': 370
  - id: sidebars
    type: background-worker
    name: sidebars Service
    isTest: false
    properties:
      filepath: ../backstage/microsite/sidebars.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: false
    x: 140
    'y': 50
  - id: typings_d
    type: background-worker
    name: typings.d Service
    isTest: false
    properties:
      filepath: ../backstage/microsite/typings.d.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: false
    x: 600
    'y': 50
  - id: frontend-client
    type: gateway-api
    name: Frontend Client App (Frontend Client Host)
    properties:
      description: The main user interface running React and Vite.
      technology: React + TypeScript
    external: true
    x: 1060
    'y': 50
  - id: types
    type: background-worker
    name: types Service (types.ts)
    isTest: false
    properties:
      filepath: ../backstage/plugins/user-settings-common/src/types.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 1060
    'y': 690
dependencies:
  - from: frontend-client
    to: docusaurus_config
    type: direct-call
    description: Renders docusaurus.config layout component
  - from: docusaurus_config
    to: types
    type: direct-call
    description: Executes local class methods / functions

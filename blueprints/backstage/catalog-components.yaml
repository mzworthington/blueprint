name: Backstage - catalog Components
version: 1.0.0
level: component
nodes:
  - id: loadtestingentityprovider
    type: background-worker
    name: LoadTestingEntityProvider Service
    isTest: false
    properties:
      filepath: contrib/catalog/LoadTestingEntityProvider.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: false
    x: 140
    'y': 50
  - id: immediateentityprovider
    type: rest-api
    name: ImmediateEntityProvider REST Endpoint
    isTest: false
    properties:
      filepath: contrib/catalog/ImmediateEntityProvider.ts
      namespaces: ''
      technology: REST Controller / Router
    external: false
    x: 600
    'y': 370
  - id: frontend-client
    type: gateway-api
    name: Frontend Client App (Frontend Client Host)
    properties:
      description: The main user interface running React and Vite.
      technology: React + TypeScript
    external: true
    x: 600
    'y': 50
  - id: errors
    type: background-worker
    name: errors Service (errors.ts)
    isTest: false
    properties:
      filepath: packages/codemods/src/errors.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 140
    'y': 690
  - id: express
    type: rest-api
    name: express REST Endpoint (types)
    isTest: false
    properties:
      filepath: packages/backend-openapi-utils/src/types/express.ts
      namespaces: ''
      technology: REST Controller / Router
    external: true
    x: 600
    'y': 690
  - id: error
    type: background-worker
    name: error Service (serialization)
    isTest: false
    properties:
      filepath: packages/errors/src/serialization/error.ts
      namespaces: ''
      technology: TypeScript Domain Service
    external: true
    x: 1060
    'y': 690
dependencies:
  - from: frontend-client
    to: immediateentityprovider
    type: direct-call
    description: Hits API routing gateway
  - from: immediateentityprovider
    to: errors
    type: direct-call
    description: Executes local class methods / functions
  - from: immediateentityprovider
    to: express
    type: direct-call
    description: Executes local class methods / functions
  - from: immediateentityprovider
    to: error
    type: direct-call
    description: References class type / calls methods
